# Configuration file for AI Feature Extraction from Drone Images (TPU v5e-1 - Colab)

# -------------------------
# DATA CONFIGURATION
# -------------------------

data:

  raw_data_dir: "data/raw"
  tiles_dir: "data/tiles"
  annotations_dir: "data/annotations"

  tile_size: 256
  tile_overlap: 32
  min_valid_pixels: 0.7

  input_channels: 3

  segmentation_classes:
    0: "background"
    1: "building_rcc"
    2: "building_tiled"
    3: "building_tin"
    4: "building_others"
    5: "road"
    6: "waterbody"

  detection_classes:
    0: "distribution_transformer"
    1: "overhead_tank"
    2: "well"

  num_seg_classes: 7
  num_det_classes: 3


# -------------------------
# MODEL CONFIGURATION
# -------------------------

model:

  segmentation:
    encoder_name: "mobilenet_v2"
    encoder_weights: "imagenet"
    decoder: "unet"
    activation: null
    in_channels: 3
    classes: 7

  detection:
    model_name: "yolov5n"
    classes: 3
    pretrained: true


# -------------------------
# TRAINING CONFIGURATION
# -------------------------

training:

  batch_size: 8                    # TPU-safe batch size
  num_workers: 0                  # MUST be 0 for TPU
  epochs_per_village_batch: 8
  max_epochs: 20
  validation_frequency: 1
  use_balanced_sampling: true


# -------------------------
# OPTIMIZATION SETTINGS
# -------------------------

optimization:

  learning_rate: 0.0003
  weight_decay: 0.00005
  lr_scheduler: "cosine"
  optimizer: "adamw"
  use_amp: false                 # Disable AMP for TPU
  gradient_accumulation_steps: 4 # Effective batch = 32
  early_stopping_patience: 12
  max_gradient_norm: 1.0


# -------------------------
# CHECKPOINTING
# -------------------------

checkpointing:

  checkpoint_dir: "/content/outputs/checkpoints"  # Colab-safe path
  save_best_only: true
  save_frequency: 1            # Save every epoch (IMPORTANT for Colab)


# -------------------------
# INCREMENTAL LEARNING
# -------------------------

incremental:

  enabled: true
  villages_per_batch: 1
  use_ewc: false
  ewc_lambda: 0.4
  replay_buffer_size: 5000


# -------------------------
# DATA AUGMENTATION
# -------------------------

augmentation:

  train:
    horizontal_flip: 0.5
    vertical_flip: 0.5
    rotate_90: 0.5
    random_brightness_contrast: 0.4
    perspective_transform: 0.3
    elastic_deformation: 0.2
    random_rain: 0.1
    gaussian_noise: 0.2
    gaussian_blur: 0.2

  val:
    normalize: true


# -------------------------
# INFERENCE CONFIGURATION
# -------------------------

inference:

  stride: 224
  batch_size: 2

  confidence_threshold: 0.5
  min_building_area: 25
  min_road_length: 10

  output_dir: "/content/outputs/predictions"
  save_geotiff: true
  save_shapefile: true


# -------------------------
# HARDWARE OPTIMIZATION
# -------------------------

hardware:

  device: "xla"                 # TPU device
  tpu_cores: 1                 # v5e-1 = single core
  memory_limit_gb: 12
  pin_memory: false


# -------------------------
# LOGGING AND MONITORING
# -------------------------

logging:

  log_dir: "/content/outputs/logs"
  log_level: "INFO"
  save_frequency: 200
  visualize_predictions: true
  visualization_dir: "/content/outputs/visualizations"


# -------------------------
# EVALUATION METRICS
# -------------------------

evaluation:

  metrics:
    - "iou"
    - "dice"
    - "precision"
    - "recall"
    - "f1"
    - "accuracy"

target_accuracy: 0.95